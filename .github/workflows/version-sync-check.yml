name: Verify addon version follows upstream image version

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  version-sync-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}

      - name: Determine base ref
        id: base
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify changed addons
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="${{ steps.base.outputs.base }}"
          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "No usable base SHA; skipping check."
            exit 0
          fi

          python3 scripts/addon_version_sync.py check --base-sha "$BASE_SHA"
