webui: "http://[HOST]:[PORT:8082]/"
panel_icon: mdi:web
ports:
  80/tcp: 8082
ports_description:
  80/tcp: Netmaker Dashboard UI
options:
  backend_url: "https://d4005b6b-netmaker-controller:8081"
schema:
  backend_url: str?
