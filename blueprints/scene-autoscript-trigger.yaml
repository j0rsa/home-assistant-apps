blueprint:
  name: Run script when scene activates
  description: Runs a selected script when a selected scene is turned on
  domain: automation
  input:
    watched_scene:
      name: Scene
      selector:
        entity:
          domain: scene
    target_script:
      name: Script
      selector:
        entity:
          domain: script

mode: single

trigger:
  - trigger: event
    event_type: call_service
    event_data:
      domain: scene
      service: turn_on

condition:
  - condition: template
    value_template: >
      {% set wanted = !input watched_scene %}
      {% set called = trigger.event.data.service_data.entity_id %}
      {{ called == wanted or (called is list and wanted in called) }}

action:
  - action: script.turn_on
    target:
      entity_id: !input target_script
